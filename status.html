<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Status Kunci</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
    .header-area { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: auto; padding-bottom: 10px; }
    h2 { margin: 0; color: #333; }
    .btn-refresh { background-color: #007bff; color: white; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-refresh:hover { background-color: #0056b3; }
    .card { max-width: 1000px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin: auto; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background-color: #232f3e; color: white; }
    .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; display: inline-block; }
    .bg-tersedia { background-color: #28a745; }
    .bg-dipinjam { background-color: #dc3545; }
  </style>
</head>
<body>

<div class="header-area">
  <h2>📊 Monitor Status Kunci</h2>
  <button class="btn-refresh" onclick="muatMonitorData()">🔄 Segarkan Data</button>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>ID Kunci</th>
        <th>Nama Kunci / Ruangan</th>
        <th>Lantai</th>
        <th>Zona</th>
        <th>Status</th>
        <th>Peminjam Saat Ini</th>
        <th>Estimasi Pengembalian</th>
      </tr>
    </thead>
    <tbody id="bodyTabel">
      <tr>
        <td colspan="7" style="text-align: center; padding: 20px;">Memuat data dari Google Sheets...</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  const scriptUrl = "https://script.google.com/macros/s/AKfycbzRNNX80qWU1dFSYhrvN1GwcW76FbIwfv6Ut4pWYZVRADZAGZflcv2kkO786Ez5BFIqwg/exec";

  function muatMonitorData() {
    const bodyTabel = document.getElementById("bodyTabel");
    
    fetch(`${scriptUrl}?aksi=ambil_status_lengkap`)
      .then(res => res.json())
      .then(data => {
        bodyTabel.innerHTML = "";
        if(data.length === 0) {
          bodyTabel.innerHTML = '<tr><td colspan="7" style="text-align:center;">Tidak ada data kunci di database.</td></tr>';
          return;
        }
        
        data.forEach(item => {
          const tr = document.createElement("tr");
          
          // Memberi highlight warna lembut pada baris tabel
          tr.style.backgroundColor = (item.status === "Dipinjam") ? "#fff0f0" : "#f0fff0";
          
          tr.innerHTML = `
            <td><b>${item.id}</b></td>
            <td>${item.nama}</td>
            <td>${item.lantai}</td>
            <td>${item.zona}</td>
            <td>
              <span class="badge ${item.status === 'Dipinjam' ? 'bg-dipinjam' : 'bg-tersedia'}">
                ${item.status}
              </span>
            </td>
            <td>${item.peminjam}</td>
            <td>${item.estimasi}</td>
          `;
          bodyTabel.appendChild(tr);
        });
      })
      .catch(() => {
        bodyTabel.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red; font-weight:bold;">⚠️ Gagal memuat data dari server Google Sheets.</td></tr>';
      });
  }

  window.onload = muatMonitorData;
</script>
</body>
</html>
