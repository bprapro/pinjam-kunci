<table id="tabelStatus" border="1" style="border-collapse: collapse; width: 100%; text-align: left;">
  <thead>
    <tr style="background-color: #222; color: white;">
      <th>ID Kunci</th>
      <th>Nama Kunci / Ruangan</th>
      <th>Lantai</th>
      <th>Zona</th>
      <th>Status</th>
      <th>Peminjam Saat Ini</th>
      <th>Estimasi Pengembalian</th>
    </tr>
  </thead>
  <tbody id="bodyTabel">
    </tbody>
</table>

<script>
function muatDataMonitor() {
  const url = "URL_WEB_APP_APPS_SCRIPT_ANDA?aksi=ambil_status_lengkap";
  const bodyTabel = document.getElementById("bodyTabel");
  
  bodyTabel.innerHTML = '<tr><td colspan="7" style="text-align:center;">Memuat data dari server...</td></tr>';
  
  fetch(url)
    .then(response => response.json())
    .then(data => {
      bodyTabel.innerHTML = "";
      if(data.length === 0) {
        bodyTabel.innerHTML = '<tr><td colspan="7" style="text-align:center;">Tidak ada data kunci.</td></tr>';
        return;
      }
      
      data.forEach(item => {
        const row = document.createElement("tr");
        
        // Atur warna background baris berdasarkan statusnya
        if (item.status === "Dipinjam") {
          row.style.backgroundColor = "#ffe6e6"; // Merah muda jika dipinjam
        } else {
          row.style.backgroundColor = "#e6ffe6"; // Hijau muda jika tersedia
        }
        
        row.innerHTML = `
          <td><b>${item.id}</b></td>
          <td>${item.nama}</td>
          <td>${item.lantai}</td>
          <td>${item.zona}</td>
          <td><span style="padding:4px 8px; border-radius:4px; font-weight:bold; color:white; background-color:${item.status === 'Dipinjam' ? '#d9534f' : '#5cb85c'}">${item.status}</span></td>
          <td>${item.peminjam}</td>
          <td>${item.estimasi}</td>
        `;
        bodyTabel.appendChild(row);
      });
    })
    .catch(error => {
      console.error("Error:", error);
      bodyTabel.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red; font-weight:bold;">Gagal memuat data dari server Google Sheets.</td></tr>';
    });
}

// Jalankan otomatis saat halaman dibuka
window.onload = muatDataMonitor;
</script>
