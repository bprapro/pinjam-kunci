<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengembalian Kunci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #camera-preview, #taken-photo { width: 100%; max-width: 400px; height: auto; border-radius: 8px; display: none; margin-bottom: 15px; }
        #camera-preview { border: 2px solid #ddd; }
        #taken-photo { border: 2px solid #dc3545; }
        .camera-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">🔄 Sistem Pengembalian Kunci</h2>
        
        <div class="card p-4 shadow-sm mb-4" id="formContainer">
            <h4 class="card-title mb-3 text-danger">Formulir Pengembalian</h4>
            <form id="formKembali">
                <div class="mb-3">
                    <label class="form-label">Nama Pengembali (Ketik min. 3 huruf awal)</label>
                    <input type="text" id="nama" class="form-control" autocomplete="off" list="list-peminjam" required placeholder="Masukkan nama Anda...">
                    <datalist id="list-peminjam"></datalist>
                    <small class="text-muted">Rekomendasi nama otomatis muncul berdasarkan peminjam aktif.</small>
                </div>

                <input type="hidden" id="nohp">

                <div class="mb-3">
                    <label class="form-label">Pilih Kunci yang Dikembalikan</label>
                    <select id="kunci" class="form-select" required disabled>
                        <option value="">Silakan masukkan nama yang valid terlebih dahulu...</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Dokumentasi (Foto Kunci yang Dikembalikan)</label>
                    <div class="mb-2" style="max-width: 200px;">
                        <select id="camera-source" class="form-select form-select-sm">
                            <option value="environment">Kamera Belakang</option>
                            <option value="user">Kamera Depan (Selfie)</option>
                        </select>
                    </div>
                    <video id="camera-preview" autoplay playsinline></video>
                    <img id="taken-photo" alt="Foto Pengembalian">
                    <div class="camera-controls">
                        <button type="button" id="start-camera" class="btn btn-outline-danger btn-sm">Buka Kamera</button>
                        <button type="button" id="take-photo" class="btn btn-danger btn-sm" style="display: none;">Ambil Foto</button>
                        <button type="button" id="retake-photo" class="btn btn-outline-secondary btn-sm" style="display: none;">Foto Ulang</button>
                    </div>
                    <input type="hidden" id="foto-data" required>
                </div>
                
                <button type="submit" id="btnSubmit" class="btn btn-danger w-100" disabled>Kembalikan Kunci</button>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none">← Kembali ke Form Peminjaman</a>
                </div>
            </form>
        </div>
        
        <div id="successMessage" class="card p-5 shadow-sm text-center bg-white border-success" style="display: none;">
            <h1 class="display-4 text-success mb-3">✅</h1>
            <h3 class="text-success fw-bold">Terima Kasih!</h3>
            <p class="fs-5 text-muted">Kunci telah berhasil dikembalikan ke dalam sistem.</p>
            <button class="btn btn-outline-success mt-3" onclick="window.location.reload();">Selesai</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzRNNX80qWU1dFSYhrvN1GwcW76FbIwfv6Ut4pWYZVRADZAGZflcv2kkO786Ez5BFIqwg/exec';
        
        const formContainer = document.getElementById('formContainer');
        const successMessage = document.getElementById('successMessage');
        const form = document.getElementById('formKembali');
        const btnSubmit = document.getElementById('btnSubmit');
        const selectKunci = document.getElementById('kunci');
        const inputNama = document.getElementById('nama');
        const inputNoHP = document.getElementById('nohp');
        const datalistPeminjam = document.getElementById('list-peminjam');
        const video = document.getElementById('camera-preview');
        const photoPreview = document.getElementById('taken-photo');
        const startCameraButton = document.getElementById('start-camera');
        const takePhotoButton = document.getElementById('take-photo');
        const retakePhotoButton = document.getElementById('retake-photo');
        const fotoDataInput = document.getElementById('foto-data');
        const cameraSourceSelect = document.getElementById('camera-source');
        let stream;
        let semuaPeminjam = [];

        window.addEventListener('DOMContentLoaded', () => {
            fetch(scriptURL + '?aksi=ambil_semua_peminjam')
                .then(response => response.json())
                .then(data => { semuaPeminjam = data; })
                .catch(err => console.error("Gagal memuat data"));
        });

        inputNama.addEventListener('input', () => {
            var namaValue = inputNama.value.trim();
            datalistPeminjam.innerHTML = '';
            
            if (namaValue.length >= 3) {
                var filterNama = semuaPeminjam.filter(nama => nama.toLowerCase().includes(namaValue.toLowerCase()));
                filterNama.forEach(nama => {
                    const option = document.createElement('option');
                    option.value = nama;
                    datalistPeminjam.appendChild(option);
                });
            }

            if (semuaPeminjam.includes(namaValue)) {
                selectKunci.innerHTML = '<option value="">Mencari kunci milik ' + namaValue + '...</option>';
                fetch(scriptURL + '?aksi=cari_kunci_peminjam&nama=' + encodeURIComponent(namaValue))
                    .then(response => response.json())
                    .then(res => {
                        // Antisipasi jika respon bertingkat objek (res.kunci) atau array polos
                        let kunciList = res.kunci ? res.kunci : (Array.isArray(res) ? res : []);
                        let nohpVal = res.nohp ? res.nohp : "";

                        if (kunciList.length > 0) {
                            selectKunci.innerHTML = '<option value="">-- Pilih Kunci --</option>';
                            kunciList.forEach(kunci => {
                                const option = document.createElement('option');
                                option.value = kunci.id;
                                option.textContent = kunci.nama;
                                selectKunci.appendChild(option);
                            });
                            selectKunci.disabled = false;
                            inputNoHP.value = nohpVal;
                            btnSubmit.disabled = false;
                        } else {
                            selectKunci.innerHTML = '<option value="">Tidak ada kunci aktif untuk nama ini</option>';
                        }
                    });
            } else {
                selectKunci.innerHTML = '<option value="">Silakan masukkan nama yang valid terlebih dahulu...</option>';
                selectKunci.disabled = true;
                btnSubmit.disabled = true;
            }
        });

        async function openCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: cameraSourceSelect.value } } });
                video.srcObject = stream;
                startCameraButton.style.display = 'none'; video.style.display = 'block'; takePhotoButton.style.display = 'inline-block'; photoPreview.style.display = 'none'; retakePhotoButton.style.display = 'none'; fotoDataInput.value = '';
            } catch (error) { alert('Gagal membuka kamera.'); }
        }

        startCameraButton.addEventListener('click', openCamera);
        cameraSourceSelect.addEventListener('change', () => { if (video.style.display === 'block') openCamera(); });

        takePhotoButton.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const max_size = 400;
            let width = video.videoWidth;
            let height = video.videoHeight;
            if (width > height) {
                if (width > max_size) { height *= max_size / width; width = max_size; }
            } else {
                if (height > max_size) { width *= max_size / height; height = max_size; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, width, height);
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.4);
            photoPreview.src = compressedBase64; photoPreview.style.display = 'block'; video.style.display = 'none';
            fotoDataInput.value = compressedBase64; takePhotoButton.style.display = 'none'; retakePhotoButton.style.display = 'inline-block';
            if (stream) stream.getTracks().forEach(track => track.stop());
        });

        retakePhotoButton.addEventListener('click', openCamera);

        form.addEventListener('submit', e => {
            e.preventDefault();
            if (!fotoDataInput.value) { alert('Silakan ambil foto bukti pengembalian.'); return; }
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Memproses Pengembalian...';

            const formData = new FormData();
            formData.append('aksi', 'kembali'); 
            formData.append('nama', inputNama.value);
            formData.append('nohp', inputNoHP.value); 
            formData.append('kunci', selectKunci.value);
            formData.append('foto', fotoDataInput.value);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    formContainer.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    alert('Gagal: ' + res.message);
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Kembalikan Kunci';
                }
            })
            .catch(error => {
                alert('Pesan terkirim! Silakan cek log data spreadsheet Anda.');
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Kembalikan Kunci';
            });
        });
    </script>
</body>
</html>
