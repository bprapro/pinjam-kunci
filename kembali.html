<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengembalian Kunci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #camera-preview, #taken-photo { width: 100%; max-width: 400px; height: auto; border-radius: 8px; display: none; margin-bottom: 15px; }
        #camera-preview { border: 2px solid #ddd; }
        #taken-photo { border: 2px solid #dc3545; }
        .camera-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">🔄 Sistem Pengembalian Kunci</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <h4 class="card-title mb-3 text-danger">Formulir Pengembalian</h4>
            <form id="formKembali">
                <div class="mb-3">
                    <label class="form-label">Nama Pengembali</label>
                    <input type="text" id="nama" class="form-control" required placeholder="Masukkan nama lengkap Anda">
                </div>
                <div class="mb-3">
                    <label class="form-label">Nomor HP (WhatsApp)</label>
                    <input type="tel" id="nohp" class="form-control" required placeholder="Contoh: 08123456789">
                </div>
                <div class="mb-3">
                    <label class="form-label">Pilih Kunci yang Dikembalikan</label>
                    <select id="kunci" class="form-select" required>
                        <option value="">Memuat kunci yang sedang dipinjam...</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Dokumentasi (Foto Kunci yang Dikembalikan)</label>
                    <div class="mb-2" style="max-width: 200px;">
                        <select id="camera-source" class="form-select form-select-sm">
                            <option value="environment">Kamera Belakang</option>
                            <option value="user">Kamera Depan (Selfie)</option>
                        </select>
                    </div>
                    <video id="camera-preview" autoplay playsinline></video>
                    <img id="taken-photo" alt="Foto Pengembalian">
                    <div class="camera-controls">
                        <button type="button" id="start-camera" class="btn btn-outline-danger btn-sm">Buka Kamera</button>
                        <button type="button" id="take-photo" class="btn btn-danger btn-sm" style="display: none;">Ambil Foto</button>
                        <button type="button" id="retake-photo" class="btn btn-outline-secondary btn-sm" style="display: none;">Foto Ulang</button>
                    </div>
                    <input type="hidden" id="foto-data" required>
                </div>
                
                <button type="submit" id="btnSubmit" class="btn btn-danger w-100" disabled>Kembalikan Kunci</button>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none">← Kembali ke Form Peminjaman</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzRNNX80qWU1dFSYhrvN1GwcW76FbIwfv6Ut4pWYZVRADZAGZflcv2kkO786Ez5BFIqwg/exec';
        
        const form = document.getElementById('formKembali');
        const btnSubmit = document.getElementById('btnSubmit');
        const selectKunci = document.getElementById('kunci');
        const video = document.getElementById('camera-preview');
        const photoPreview = document.getElementById('taken-photo');
        const startCameraButton = document.getElementById('start-camera');
        const takePhotoButton = document.getElementById('take-photo');
        const retakePhotoButton = document.getElementById('retake-photo');
        const fotoDataInput = document.getElementById('foto-data');
        const cameraSourceSelect = document.getElementById('camera-source');
        let stream;

        // Memuat kunci yang berstatus "Dipinjam" saja
        window.addEventListener('DOMContentLoaded', () => {
            fetch(scriptURL + '?status=Dipinjam')
                .then(response => response.json())
                .then(data => {
                    selectKunci.innerHTML = '<option value="">-- Pilih Kunci --</option>';
                    if (data.length === 0) {
                        selectKunci.innerHTML = '<option value="">Tidak ada kunci yang sedang dipinjam</option>';
                        return;
                    }
                    data.forEach(kunci => {
                        const option = document.createElement('option');
                        option.value = kunci.id;
                        option.textContent = kunci.nama;
                        selectKunci.appendChild(option);
                    });
                    btnSubmit.disabled = false;
                })
                .catch(error => {
                    selectKunci.innerHTML = '<option value="">Gagal memuat data kunci</option>';
                });
        });

        async function openCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: cameraSourceSelect.value } } });
                video.srcObject = stream;
                startCameraButton.style.display = 'none'; video.style.display = 'block'; takePhotoButton.style.display = 'inline-block'; photoPreview.style.display = 'none'; retakePhotoButton.style.display = 'none'; fotoDataInput.value = '';
            } catch (error) { alert('Gagal membuka kamera.'); }
        }

        startCameraButton.addEventListener('click', openCamera);
        cameraSourceSelect.addEventListener('change', () => { if (video.style.display === 'block') openCamera(); });

        takePhotoButton.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 600; canvas.height = (video.videoHeight / video.videoWidth) * 600;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, canvas.width, canvas.height);
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
            photoPreview.src = compressedBase64; photoPreview.style.display = 'block'; video.style.display = 'none';
            fotoDataInput.value = compressedBase64; takePhotoButton.style.display = 'none'; retakePhotoButton.style.display = 'inline-block';
            if (stream) stream.getTracks().forEach(track => track.stop());
        });

        retakePhotoButton.addEventListener('click', openCamera);

        form.addEventListener('submit', e => {
            e.preventDefault();
            if (!fotoDataInput.value) { alert('Silakan ambil foto bukti pengembalian.'); return; }
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Memproses Pengembalian...';

            const formData = new FormData();
            formData.append('aksi', 'kembali'); // Mengirimkan instruksi kalau ini aksi pengembalian
            formData.append('nama', document.getElementById('nama').value);
            formData.append('nohp', document.getElementById('nohp').value);
            formData.append('kunci', selectKunci.value);
            formData.append('foto', fotoDataInput.value);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('Kunci Berhasil Dikembalikan! Status kunci di spreadsheet kembali Tersedia.');
                    window.location.reload();
                } else {
                    alert('Gagal: ' + res.message);
                    btnSubmit.disabled = false;
                }
            })
            .catch(error => {
                alert('Error: ' + error.message);
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
