<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Kunci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #camera-preview {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: none;
            margin-bottom: 15px;
        }
        #taken-photo {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid #4caf50;
            border-radius: 8px;
            display: none;
            margin-bottom: 15px;
        }
        .camera-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container my-5" style="max-width: 600px;">
        <h2 class="text-center mb-4">🔑 Sistem Peminjaman Kunci</h2>
        
        <div class="card p-4 shadow-sm mb-4">
            <h4 class="card-title mb-3">Formulir Peminjaman</h4>
            <form id="formPinjam">
                <div class="mb-3">
                    <label class="form-label">Nama Peminjam</label>
                    <input type="text" id="nama" class="form-control" required placeholder="Masukkan nama lengkap Anda">
                </div>
                <div class="mb-3">
                    <label class="form-label">Nomor HP (WhatsApp)</label>
                    <input type="tel" id="nohp" class="form-control" required placeholder="Contoh: 08123456789">
                </div>
                <div class="mb-3">
                    <label class="form-label">Pilih Kunci</label>
                    <select id="kunci" class="form-select" required>
                        <option value="">Memuat daftar kunci...</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Dokumentasi (Ambil Foto Kunci/Peminjam Langsung)</label>
                    
                    <div id="camera-select-container" class="mb-2" style="max-width: 200px;">
                        <select id="camera-source" class="form-select form-select-sm">
                            <option value="environment">Kamera Belakang</option>
                            <option value="user">Kamera Depan (Selfie)</option>
                        </select>
                    </div>

                    <video id="camera-preview" autoplay playsinline></video>
                    <img id="taken-photo" alt="Foto yang Diambil">
                    
                    <div class="camera-controls">
                        <button type="button" id="start-camera" class="btn btn-outline-primary btn-sm">Buka Kamera</button>
                        <button type="button" id="take-photo" class="btn btn-primary btn-sm" style="display: none;">Ambil Foto</button>
                        <button type="button" id="retake-photo" class="btn btn-outline-secondary btn-sm" style="display: none;">Foto Ulang</button>
                    </div>
                    
                    <input type="hidden" id="foto-data" name="foto-data" required>
                    <small class="text-muted">Pilih jenis kamera terlebih dahulu, lalu klik Buka Kamera.</small>
                </div>
                
                <button type="submit" id="btnSubmit" class="btn btn-primary w-100" disabled>Pinjam Kunci</button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzRNNX80qWU1dFSYhrvN1GwcW76FbIwfv6Ut4pWYZVRADZAGZflcv2kkO786Ez5BFIqwg/exec';
        
        const form = document.getElementById('formPinjam');
        const btnSubmit = document.getElementById('btnSubmit');
        const selectKunci = document.getElementById('kunci');
        
        // Elemen Kamera
        const video = document.getElementById('camera-preview');
        const photoPreview = document.getElementById('taken-photo');
        const startCameraButton = document.getElementById('start-camera');
        const takePhotoButton = document.getElementById('take-photo');
        const retakePhotoButton = document.getElementById('retake-photo');
        const fotoDataInput = document.getElementById('foto-data');
        const cameraSourceSelect = document.getElementById('camera-source');
        
        let stream;

        // Ambil data kunci dari Spreadsheet
        window.addEventListener('DOMContentLoaded', () => {
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    selectKunci.innerHTML = '<option value="">-- Pilih Kunci --</option>';
                    if (data.length === 0) {
                        selectKunci.innerHTML = '<option value="">Semua kunci sedang dipinjam</option>';
                        return;
                    }
                    data.forEach(kunci => {
                        const option = document.createElement('option');
                        option.value = kunci.id;
                        option.textContent = kunci.nama;
                        selectKunci.appendChild(option);
                    });
                    btnSubmit.disabled = false;
                })
                .catch(error => {
                    selectKunci.innerHTML = '<option value="">Gagal memuat data kunci</option>';
                    console.error('Error memuat kunci:', error);
                });
        });

        // Fungsi Membuka Kamera Berdasarkan Pilihan (Depan/Belakang)
        async function openCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            const selectedMode = cameraSourceSelect.value; // Ambil nilai 'user' atau 'environment'
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: selectedMode } } 
                });
                video.srcObject = stream;
                
                startCameraButton.style.display = 'none';
                video.style.display = 'block';
                takePhotoButton.style.display = 'inline-block';
                photoPreview.style.display = 'none';
                retakePhotoButton.style.display = 'none';
                fotoDataInput.value = ''; 
            } catch (error) {
                alert('Gagal mengakses jenis kamera yang dipilih. Pastikan izin kamera diberikan.');
                console.error('Error kamera:', error);
            }
        }

        // Event handler ketika tombol Buka Kamera diklik
        startCameraButton.addEventListener('click', openCamera);

        // Jika user mengubah pilihan kamera saat kamera sedang aktif, otomatis muat ulang kameranya
        cameraSourceSelect.addEventListener('change', () => {
            if (video.style.display === 'block') {
                openCamera();
            }
        });

        // Ambil Foto
        takePhotoButton.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Kompresi otomatis (lebar 600px, kualitas 60%) agar hemat ruang Google Drive
            const max_width = 600;
            const scaleSize = max_width / canvas.width;
            canvas.width = max_width;
            canvas.height = canvas.height * scaleSize;
            
            ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, canvas.width, canvas.height);
            
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
            
            photoPreview.src = compressedBase64;
            photoPreview.style.display = 'block';
            video.style.display = 'none';
            
            fotoDataInput.value = compressedBase64;
            
            takePhotoButton.style.display = 'none';
            retakePhotoButton.style.display = 'inline-block';
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });

        // Foto Ulang
        retakePhotoButton.addEventListener('click', openCamera);

        // Submit Form
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            if (!fotoDataInput.value) {
                alert('Silakan ambil foto dokumentasi terlebih dahulu.');
                return;
            }
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Mengunggah Data & Foto ke Sistem...';

            const formData = new FormData();
            formData.append('nama', document.getElementById('nama').value);
            formData.append('nohp', document.getElementById('nohp').value);
            formData.append('kunci', selectKunci.value);
            formData.append('foto', fotoDataInput.value);

            fetch(scriptURL, { 
                method: 'POST', 
                body: formData
            })
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    alert('Peminjaman Berhasil! Foto dokumentasi telah tersimpan aman di Google Drive.');
                    window.location.reload();
                } else {
                    alert('Gagal menyimpan: ' + res.message);
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Pinjam Kunci';
                }
            })
            .catch(error => {
                alert('Terjadi kesalahan sistem: ' + error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Pinjam Kunci';
            });
        });
    </script>
</body>
</html>
